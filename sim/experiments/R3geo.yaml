# R3-geo — анизотропия Коссера на ГЕОДЕЗИЧЕСКОЙ жёсткости (cosserat_geo, решение архитектора).
# E_i = k_b·d² + (k_t−k_b)·d²·z²/(x²+y²+z²+1e-12). При k_b=k_t ≡ geodesic (рабочая R1).
# Зеркальные пары (q/q⊗j): ±-симметрия и маргиналы тождественны по построению.
# ПРИЁМКА (гейт энергии): ячейка k_t=k_b (ρ=1) должна совпасть с зелёным geodesic κ=1 (<2σ).
# Пре-регистрация НЕ редактируется после запуска (SPEC §9.1).

name: R3geo
description: >
  Анизотропный Коссера на геодезической жёсткости. Свип k_t/k_b∈{0.1,1,10} при фикс.
  суммарной жёсткости (2k_b+k_t=3·k_e, ρ=1 ⇒ k_b=k_t=k_e≡geodesic κ=1). T=0, блочный
  протокол, зеркальные пары, 2 сида. Вопрос: управляет ли изгиб ножницами (вывод atan2
  под подозрением как артефакт — подтвердить/похоронить на чистой геодезической энергии).

# Пре-регистрация:
prediction: >
  Знак ферро. Приёмка: ρ=1 совпадает с geodesic κ=1 (амплитуда ≈0.38). Вопрос: двигает ли
  анизотропия изгиб/скрутка ножницы? atan2-вывод (жёсткий изгиб→ступень) под подозрением;
  chordal дал декуплирование (артефакт мягкости). Ждём чистого ответа.

physics:
  N: 64
  k_c: 1.0
  k_e: 0.0
  elastic: cosserat_geo

kappa_equiv: 1.0
cosserat_grid: [0.1, 1.0, 10.0]

dynamics:
  T0: 0.0
  decay: 1.0
  steps: 25000
  block_convergence:
    block_steps: 25000
    ceiling: 200000
    sigma_mult: 2.0
    e_floor: 0.01

sweep:
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 8192
  seeds: [0, 1]
  mirror_pairs: true

smoke:
  B: 256
  block_steps: 2000
  ceiling: 8000
  theta_deg: [0.0, 90.0, 180.0]
  seeds: [0]
