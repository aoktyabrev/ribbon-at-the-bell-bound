# R4a — сектор нулевой суммарной скрутки Tw=0, cosserat_geo + spinor. Решение архитектора.
# Связь Tw=const (проекция + Ньютонова коррекция, τ̃=2z). Зеркальные пары. Наблюдаемые M1/M2.
# Пре-регистрация НЕ редактируется после запуска (SPEC §9.1).

name: R4a
description: >
  Спинорная лента с анизотропией Коссера (cosserat_geo, spinor) и ограничением суммарной
  скрутки Tw=0. Свип k_t/k_b∈{0.1,1}, зеркальные пары, 2 сида. Наблюдаемые M1 (оси s,t) и
  M2 (t̃=h·sign(n_B·b)). Диагностика меры (гистограммы c_A,c_B, профиль скрутки).

# Пре-регистрация (архитектор, уверенность НИЗКАЯ, обе гипотезы легальны):
prediction: >
  Связь Tw=0 может заставить твист-отклики концов компенсироваться; появляется ли
  антиферро-компонента в M1 (оси) или M2 (голономно-одетая) — ЦЕНТРАЛЬНЫЙ вопрос. Да/нет.

physics:
  N: 64
  k_c: 1.0
  k_e: 0.0
  spinor: true
  elastic: cosserat_geo

kappa_equiv: 1.0
cosserat_grid: [0.1, 1.0]     # k_t/k_b (изгиб-жёсткая и изотропная)
twist_sectors: [0.0]          # Tw = 0

measure_diag:                 # диагностика эффективной меры (архитектор)
  enabled: true
  theta_deg: [0.0, 60.0, 120.0]
  references: [uniform, ks_maxc, delta_peak]

dynamics:
  T0: 0.0
  decay: 1.0
  steps: 25000
  block_convergence:
    block_steps: 25000
    ceiling: 200000
    sigma_mult: 2.0
    e_floor: 0.01

sweep:
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 8192
  seeds: [0, 1]
  mirror_pairs: true

smoke:
  B: 256
  block_steps: 2000
  ceiling: 8000
  theta_deg: [0.0, 90.0, 180.0]
  seeds: [0]
