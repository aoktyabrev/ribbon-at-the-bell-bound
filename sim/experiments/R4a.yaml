# R4a — сектор нулевой суммарной скрутки (Tw=0), спинорный режим. Решение архитектора.
# Связь Tw=const (проекция градиента + коррекция). Наблюдаемые M1 (оси) и M2 (голономно-одетая).
# Пре-регистрация НЕ редактируется после запуска (SPEC §9.1).

name: R4a
description: >
  Спинорная лента с ограничением суммарной скрутки Tw=0 (проекция градиента к
  многообразию Tw=const, коррекция SHAKE-стиля). Инициализация — случайные ленты
  сектора Tw=0 (изгиб случаен, поканальная скрутка нулевая). Свип θ. Наблюдаемые
  M1 (оси s,t) и M2 (t̃=h·sign(n_B·b)).

# Пре-регистрация (архитектор, уверенность НИЗКАЯ, обе гипотезы легальны):
prediction: >
  Гипотеза: связь заставляет твист-отклики концов компенсироваться; появляется ли
  антиферро-компонента в M1 (оси) или M2 (голономно-одетая) — ЦЕНТРАЛЬНЫЙ вопрос.
  Может быть да, может нет.

physics:
  N: 64
  k_c: 1.0
  k_e: 63.0        # κ=1
  kappa: 1.0
  spinor: true
  elastic: spinor

twist_sectors: [0.0]   # Tw = 0

# Диагностика меры (архитектор, до запуска R4a): на финальных состояниях — гистограммы
# c_A=n_A·a и c_B=n_B·b, раздельно по ветвям (s,t) и по θ∈{0°,60°,120°}; оверлей трёх
# эталонов: равномерный по сфере (плотность const по c), КС ∝ max(c,0), дельта-пик у |c|=1.
# Вопрос: какую эффективную меру рождает релаксация со связью Tw=0. (Реализуется в раннере
# R4 при разблокировке гейта; пока R3 красный — параметр зафиксирован тут пре-регистрацией.)
measure_diag:
  enabled: true
  theta_deg: [0.0, 60.0, 120.0]
  references: [uniform, ks_maxc, delta_peak]

dynamics:
  T0: 0.0
  decay: 1.0
  steps: 25000
  block_convergence:
    block_steps: 25000
    ceiling: 200000
    sigma_mult: 2.0
    e_floor: 0.01

sweep:
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 8192
  seeds: [0, 1]

smoke:
  B: 256
  block_steps: 2000
  ceiling: 8000
  theta_deg: [0.0, 90.0, 180.0]
  seeds: [0]
