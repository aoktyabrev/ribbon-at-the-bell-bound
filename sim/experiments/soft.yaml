# Мягкая лента — спинор, k_e ≈ T0 (энергия кинка сопоставима с температурой). Решение архитектора.
# Единственный режим, где отжиг может населить кинки (h=−1). Пре-регистрация не редактируется (SPEC §9.1).

name: soft
description: >
  Мягкая спинорная лента: k_e ∈ {1, 3} ≈ T0=1 (в отличие от жёсткой k_e=63, где энергия
  кинка ≫ T0). Ланжевен с отжигом decay=0.9995. Диагностики: популяция голономии h,
  условная E(θ|h), голономно-одетая M2. Впервые может появиться P(h=−1) > 0.

# Пре-регистрация (архитектор):
prediction: >
  P(h=−1) > 0 ВПЕРВЫЕ (энергия кинка ~k_e·arccos² сопоставима с T0). Расщепление E по h
  (E(θ|h=−1) ≠ E(θ|h=+1)) — открытый вопрос.

physics:
  N: 64
  k_c: 1.0
  spinor: true
  elastic: spinor

soft_ke_grid: [1.0, 3.0]

dynamics:
  T0: 1.0
  decay: 0.9995
  steps: 25000
  block_convergence:
    block_steps: 25000
    ceiling: 200000
    sigma_mult: 2.0
    e_floor: 0.01
    cold_T: 1.0e-4

sweep:
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 8192
  seeds: [0, 1]

smoke:
  B: 256
  block_steps: 2000
  ceiling: 8000
  theta_deg: [0.0, 90.0, 180.0]
  seeds: [0]
