# R0 — контроль «разрезанная лента» (SPEC §3).
# Связи между кадрами нет (k_e = 0): концы релаксируют независимо под своими
# зажимами. Пре-регистрированное предсказание фиксируется ДО первого запуска
# и НЕ редактируется после (SPEC §9.1, CLAUDE.md).

name: R0
description: >
  Разрезанная лента: k_e = 0, связь между концами отсутствует. Каждый конец —
  независимый кадр под квадратичным зажимом с двумя минимумами ±ось. Контроль
  исправности зажима, классификатора ветвей и динамики.
prediction: >
  E(θ) ≈ 0 для всех θ (независимые концы ⇒ ⟨s·t⟩ = ⟨s⟩⟨t⟩ ≈ 0); маргиналы
  P(s=+) = P(t=+) = 0.5 ± 3σ; ±-симметрия P(s,t) = P(−s,−t). Если нет — баг, стоп.

physics:
  N: 64          # число кадров в ленте
  k_e: 0.0       # УПРУГОСТЬ ОТКЛЮЧЕНА — суть контроля R0
  k_c: 1.0       # жёсткость зажимов концов
  spinor: false  # фаза 1: геодезия с модулем |<p,q>|

dynamics:
  lr: 0.05       # шаг градиентного спуска
  T0: 0.0        # T=0: чистый градиентный спуск, без ланжевеновского шума
  decay: 1.0     # отжиг не нужен при T0=0
  steps: 2000    # с запасом на оседание концов в ближайший минимум

sweep:            # SPEC R1-сетка: θ = 0..180° шагом 7.5° (25 точек)
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 4096        # лент в батче (полный прогон)
  seeds: [0, 1]  # воспроизводимость на 2 сидах (SPEC §4.2)

smoke:            # быстрая проверка каркаса (CLAUDE.md): B=256, 200 шагов, 3 точки θ
  B: 256
  steps: 200
  theta_deg: [0.0, 90.0, 180.0]
  seeds: [0]
