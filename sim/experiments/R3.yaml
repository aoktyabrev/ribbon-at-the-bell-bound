# R3 — анизотропия (расщепление Коссера: изгиб vs скрутка). Решение архитектора.
# Энергия E = Σ k_b(ω_x²+ω_y²) + k_t·ω_z², ω = log(q_i⁻¹⊗q_{i+1}) в материальном фрейме i.
# Свип k_t/k_b при ФИКСИРОВАННОЙ суммарной жёсткости (2k_b+k_t = κ=1-эквивалент).
# Пре-регистрация НЕ редактируется после запуска (SPEC §9.1).

name: R3
description: >
  Дискретный стержень Коссера: изгиб (поперечные ω) и скрутка (ω_z) с раздельными
  жёсткостями. Свип k_t/k_b ∈ {0.1, 1, 10} при фиксированной суммарной жёсткости
  (2k_b+k_t = 3·k_e/4, изотропная точка ≡ geodesic κ=1). T=0, блочный протокол.

# Пре-регистрация (архитектор):
prediction: >
  Знак остаётся ферро. Открытый вопрос: двигает ли анизотропия изгиб/скрутка ножницы
  (амплитуду E и гармонику A3/A1) относительно изотропной точки? Уверенности нет.

physics:
  N: 64
  k_c: 1.0
  k_e: 0.0          # не используется в режиме cosserat (жёсткости через k_b,k_t)
  elastic: cosserat

kappa_equiv: 1.0    # калибровка суммарной жёсткости к geodesic κ=1
cosserat_grid: [0.1, 1.0, 10.0]   # k_t/k_b

dynamics:
  T0: 0.0
  decay: 1.0
  steps: 25000
  block_convergence:
    block_steps: 25000
    ceiling: 200000
    sigma_mult: 2.0
    e_floor: 0.01

sweep:
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 8192
  seeds: [0, 1]

smoke:
  B: 256
  block_steps: 2000
  ceiling: 8000
  theta_deg: [0.0, 90.0, 180.0]
  seeds: [0]
