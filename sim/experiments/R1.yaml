# R1 — базовый эксперимент (SPEC §3).
# Изотропная цепочка кватернионов, T=0 (чистый градиентный спуск от Haar-случайных
# начальных фреймов), свип θ и жёсткости связи κ. Пре-регистрированное предсказание
# фиксируется ДО первого запуска и НЕ редактируется после (SPEC §9.1).

name: R1
description: >
  Изотропная лента (geodesic-упругость с модулем, фаза 1), T=0. Свип θ на R1-сетке
  и свип безразмерной жёсткости κ = k_e/((N−1)·k_c) ∈ {0.1, 1, 10}. Вопрос §3:
  пила, p-семейство или что-то третье? Полный протокол анализа §4 на каждую ячейку.

# Пре-регистрация (архитектор, до запуска):
prediction: >
  κ=10 (сильная связь) → семейство пилы / p≈1, наибольшая амплитуда E; κ=1 → та же
  форма семейства; κ=0.1 (слабая связь) → та же форма, амплитуда E подавлена к нулю.
  p=2 НЕ ожидается ни в одной ячейке (нить/1D-мера ⇒ классика, note §2.7).

physics:
  N: 64
  k_c: 1.0          # жёсткость зажимов; k_e задаётся через κ (см. kappa_grid)
  spinor: false     # фаза 1: геодезия с модулем |<p,q>|
  elastic: geodesic # SPEC §2.2 (chordal — на фазу C)

# κ-сетка: k_e = κ·(N−1)·k_c;  lr = 0.5/(k_e+k_c) вычисляется на ячейку.
kappa_grid: [0.1, 1.0, 10.0]

dynamics:
  T0: 0.0           # T=0: чистый градиентный спуск
  decay: 1.0        # отжиг не нужен при T0=0
  steps: 6000
  convergence:      # критерий (архитектор): доля лент с |ΔE|/шаг > 1e-6 < 1%,
    de_threshold: 1.0e-6   # иначе однократное удвоение steps с записью в отчёт
    frac_threshold: 0.01
    max_doublings: 1

sweep:              # SPEC R1-сетка: θ = 0..180° шагом 7.5° (25 точек)
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 8192
  seeds: [0, 1]     # воспроизводимость на 2 сидах (SPEC §4.2)

smoke:              # быстрая проверка пайплайна: B=256, 200 шагов, 3 точки θ, 1 сид
  B: 256
  steps: 200
  theta_deg: [0.0, 90.0, 180.0]
  seeds: [0]
