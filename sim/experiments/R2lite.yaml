# R2-лайт — термическая мера, изотропная (geodesic) лента (решение архитектора Q2).
# Формальное закрытие пре-регистрации R2: ланжевен с отжигом, κ=1, geodesic.
# Пре-регистрация НЕ редактируется после запуска (SPEC §9.1).

name: R2lite
description: >
  Изотропная лента (geodesic), κ=1, N=64. Ланжевен с геометрическим отжигом, T0=1.0,
  три скорости decay. Полный свип θ, фиты семейств + гармоники A3/A1. Меняет ли
  термическая мера форму кривой относительно R1 (T=0).

# Пре-регистрация (гипотеза архитектора, §4 «ножницы»):
prediction: >
  Отжиг ПОДНИМАЕТ амплитуду (выбивает ленты из локальных минимумов), но ведёт форму к
  СТУПЕНИ/tanh, а НЕ к косинусу; A3/A1 уходит в минус с замедлением отжига. Знак остаётся
  ферро. (Согласуется с превью из R5b: 0.49→0.66→0.99 по decay.)

physics:
  N: 64
  k_c: 1.0
  k_e: 63.0         # κ=1
  kappa: 1.0
  elastic: geodesic

decay_grid: [0.999, 0.9995, 0.9999]

dynamics:
  T0: 1.0
  decay: 0.999
  steps: 25000
  block_convergence:
    block_steps: 25000
    ceiling: 200000
    sigma_mult: 2.0
    e_floor: 0.01
    cold_T: 1.0e-4

sweep:
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 8192
  seeds: [0, 1]

smoke:
  B: 256
  block_steps: 2000
  ceiling: 8000
  theta_deg: [0.0, 90.0, 180.0]
  seeds: [0]
