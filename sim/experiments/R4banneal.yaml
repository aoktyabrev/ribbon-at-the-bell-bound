# R4b-anneal — снятие вырожденности Tw=2π отжигом (обязателен, решение архитектора).
# cosserat_geo+spinor, честный сэмплер, зеркальные пары, связь Tw=const. T0=1, два decay.
# Ключевой тест (c): универсальна ли термо-мера (веса ветвей не зависят от скорости охлаждения)?
# Пре-регистрация НЕ редактируется после запуска (SPEC §9.1).

name: R4banneal
description: >
  Отжиг снимает вырожденность основного состояния Tw=2π (квенч T=0 давал сид-флипы в точках
  фрустрации). Обе Tw=2π ячейки (k_t/k_b∈{0.1,1}) + Tw=0 контроль, T0=1, decay∈{0.9995,0.9999}.
  Наблюдаемые: E(θ|сектор), доли ветвей P(st|θ,сектор), профиль весов конкурирующих ветвей в
  бывших точках фрустрации (θ≈30,120,172.5 + соседи).

# Пре-регистрация (архитектор):
prediction: >
  (a) отжиг устраняет сид-флипы (веса ветвей воспроизводимы) — если нет, вырожденность точная
  (симметрия?), отдельная загадка; (b) доля антиферро в Tw=2π θ-зависима, форма открыта;
  (c) КЛЮЧЕВОЕ — два decay дают согласованные веса (термо-мера определена); если веса зависят
  от decay, мера неуниверсальна.

physics:
  N: 64
  k_c: 1.0
  k_e: 0.0
  spinor: true
  elastic: cosserat_geo

kappa_equiv: 1.0
cosserat_grid: [0.1, 1.0]
twist_sectors: [0.0, 1.0]        # Tw=0 контроль + Tw=2π
decay_grid: [0.9995, 0.9999]     # две скорости отжига (тест универсальности меры)

dynamics:
  T0: 1.0
  decay: 0.9995                   # переопределяется decay_grid
  steps: 50000
  block_convergence:
    block_steps: 50000
    ceiling: 600000
    sigma_mult: 2.0
    e_floor: 0.01
    cold_T: 1.0e-4

sweep:
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 8192
  seeds: [0, 1]
  mirror_pairs: true

smoke:
  B: 256
  block_steps: 3000
  ceiling: 12000
  theta_deg: [0.0, 30.0, 90.0, 172.5]
  seeds: [0, 1]
