# R5b — термический спинор + голономия (главная линия, решение архитектора).
# Спинорный режим, κ=1, ланжевен с отжигом. Единственная спинорная наблюдаемая,
# не факторизующаяся через SU(2)→SO(3) — голономия h = sign(Π<q_i,q_{i+1}>).
# Пре-регистрация фиксируется ДО первого запуска и НЕ редактируется после (SPEC §9.1).

name: R5b
description: >
  Спинорная лента (elastic=spinor), κ=1, N=64. Ланжевен с геометрическим отжигом,
  T0=1.0, три скорости decay. Диагностики на финалах: плотность кинков, распределение
  голономии h, безусловная E(θ), условные E(θ|h=±1), корреляция h с ветвью, и
  голономно-одетая наблюдаемая M2 t̃=h·sign(n_B·b). Вопрос: населяет ли отжиг кинки и
  проявляется ли спинорная структура в наблюдаемых.

# Пре-регистрация (архитектор, до запуска):
prediction: >
  (a) отжиг населяет кинки: плотность и P(h=−1) растут с decay (медленнее отжиг —
  меньше замороженных кинков — проверить направление); (b) безусловная E(θ) остаётся
  ферро (осевые наблюдаемые гейдж-слепы); (c) условная E(θ|h) — открытый вопрос, ЕСЛИ
  E(θ|h=−1) ≠ E(θ|h=+1), это первый сигнал видимости спинорной структуры.
  M2 (вариант модели): при заметной популяции h=−1 появляется антиферро-компонента,
  форма — открытый вопрос.

physics:
  N: 64
  k_c: 1.0
  k_e: 63.0         # κ=1: k_e = κ·(N−1)·k_c = 1·63·1
  kappa: 1.0
  spinor: true
  elastic: spinor   # геодезия без модуля

decay_grid: [0.999, 0.9995, 0.9999]   # три скорости отжига

dynamics:
  T0: 1.0           # ланжевен с отжигом
  decay: 0.999      # переопределяется decay_grid
  steps: 25000      # placeholder (block_convergence задаёт block_steps)
  block_convergence:
    block_steps: 25000
    ceiling: 200000
    sigma_mult: 2.0
    e_floor: 0.01
    cold_T: 1.0e-4  # сходимость проверяется только после T < cold_T

sweep:
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 8192
  seeds: [0, 1]

smoke:
  B: 256
  block_steps: 2000
  ceiling: 8000
  theta_deg: [0.0, 90.0, 180.0]
  seeds: [0]
