# R5 — спинорная лента (SPEC §3, запущен ВНЕ ОЧЕРЕДИ по решению архитектора).
# Геодезия БЕЗ модуля: d(p,q)=arccos(<p,q>), различает q и −q (720°-периодичность,
# трюк с ремнём). Критический тест спинорной структуры. Сравнение geodesic vs spinor
# при κ∈{1,10} под единым блочным протоколом сходимости.
# Пре-регистрация фиксируется ДО первого запуска и НЕ редактируется после (SPEC §9.1).

name: R5
description: >
  Спинорная лента vs изотропная (geodesic). elastic∈{geodesic, spinor} × κ∈{1,10}.
  Спинорный режим штрафует полуоборотные кинки <q_i,q_{i+1}> < 0, которые при T=0
  застревают. Вопрос: сдвигает ли спинорная структура форму/амплитуду и как ведут
  себя кинки относительно ветви исхода.

# Пре-регистрация (архитектор, до запуска):
prediction: >
  (a) знак остаётся ферро (n(−q)=n(q), зажимы знако-слепы); (b) кинки застревают
  при T=0, плотность > 0; (c) амплитуда E(0) при κ=1 spinor НИЖЕ, чем geodesic
  (ловушки кинков подавляют выравнивание); (d) форма A3/A1 — без прогноза, открытый вопрос.

physics:
  N: 64
  k_c: 1.0        # k_e задаётся через κ (k_e = κ·(N−1)·k_c)

elastic_grid: [geodesic, spinor]   # 2×2 ячейки для честного сравнения
kappa_grid: [1.0, 10.0]

dynamics:
  T0: 0.0         # T=0: чистый градиентный спуск (кинки застревают)
  decay: 1.0
  steps: 25000    # значение по умолчанию; при block_convergence переопределяется block_steps
  block_convergence:              # ответ на ARCH-Q#1: критерий по НАБЛЮДАЕМОЙ
    block_steps: 25000
    ceiling: 200000               # потолок шагов на (сид, θ)
    sigma_mult: 2.0               # порог = max(2·σ_MC, e_floor)
    e_floor: 0.01

sweep:            # свип θ как в R1: 0..180° шагом 7.5°
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 8192
  seeds: [0, 1]

smoke:            # быстрая проверка: маленький батч, короткие блоки, 3 точки θ
  B: 256
  block_steps: 2000
  ceiling: 6000
  theta_deg: [0.0, 90.0, 180.0]
  seeds: [0]
