# R4b — секторы Tw=0 vs Tw=2π бок о бок (cosserat_geo+spinor). Первый тест видимости топологии.
# Связь Tw=const (проекция + Ньютонова коррекция, τ̃=2z). Зеркальные пары. M1/M2 + мера.
# Пре-регистрация НЕ редактируется после запуска (SPEC §9.1).

name: R4b
description: >
  Спинорная анизотропная лента (cosserat_geo, spinor), два сектора суммарной скрутки Tw=0
  и Tw=2π бок о бок (в спинорном режиме различаются ℤ₂-классом, 720°). Свип k_t/k_b∈{0.1,1},
  зеркальные пары, 2 сида. Наблюдаемые M1/M2 + диагностика меры.

# Пре-регистрация ОБНОВЛЁННАЯ (архитектор, после фикса degenerate-init v2 sector_sample):
# Первый R4b дал КРАСНЫЙ (сид-флипы в Tw=2π из-за вырожденной twist_free_init: батч ≈ один
# сэмпл сектора). Фикс: честный сэмплинг (каждая лента — независимая точка сектора, разнообразная
# скрутка по связям, Tw=target точно). Пре-регистрация НЕ редактируется после ЭТОГО запуска.
prediction: >
  (a) доля антиферро-ветви (s·t=−1) в секторе Tw=2π строго > 0 (существование показано сидом1
  первого прогона); (b) её θ-зависимость и форма E(θ|Tw=2π) — открытый вопрос; (c) Tw=0 — чисто
  ферро; сектора различаются (E(θ|Tw=0) ≠ E(θ|Tw=2π)) — ПЕРВЫЙ подтверждённый канал видимости
  топологии, ЕСЛИ (a)+(c) выживут при сходимости сидов (красный ушёл, фрустрация = смесь ветвей,
  не сид-флип).

physics:
  N: 64
  k_c: 1.0
  k_e: 0.0
  spinor: true
  elastic: cosserat_geo

kappa_equiv: 1.0
cosserat_grid: [0.1, 1.0]
twist_sectors: [0.0, 1.0]      # Tw=0 и Tw=2π

measure_diag:
  enabled: true
  theta_deg: [0.0, 60.0, 120.0]
  references: [uniform, ks_maxc, delta_peak]

dynamics:
  T0: 0.0
  decay: 1.0
  steps: 25000
  block_convergence:
    block_steps: 50000
    ceiling: 600000          # аудит R4a: изгиб-жёсткая сходится к ~400k (иначе транзиент)
    sigma_mult: 2.0
    e_floor: 0.01

sweep:
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 8192
  seeds: [0, 1]
  mirror_pairs: true

smoke:
  B: 256
  block_steps: 2000
  ceiling: 8000
  theta_deg: [0.0, 90.0, 180.0]
  seeds: [0]
