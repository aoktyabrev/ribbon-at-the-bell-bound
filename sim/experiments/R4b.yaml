# R4b — секторы Tw=0 vs Tw=2π бок о бок (спинор). Первый тест видимости топологии.
# Связь Tw=const (проекция градиента + коррекция). Наблюдаемые M1 (оси) и M2 (голономно-одетая).
# Пре-регистрация НЕ редактируется после запуска (SPEC §9.1).

name: R4b
description: >
  Спинорная лента, два сектора суммарной скрутки Tw=0 и Tw=2π бок о бок (в спинорном
  режиме различаются ℤ₂-классом, 720°). Связь Tw=const. Свип θ, наблюдаемые M1 и M2.

# Пре-регистрация (архитектор, уверенность НИЗКАЯ, обе гипотезы легальны):
prediction: >
  Зависит ли E(θ) от сектора Tw (0 vs 2π)? Первый тест видимости топологии через связь.
  Если E(θ|Tw=0) ≠ E(θ|Tw=2π) — топология видна. Уверенность низкая, обе гипотезы легальны.

physics:
  N: 64
  k_c: 1.0
  k_e: 63.0        # κ=1
  kappa: 1.0
  spinor: true
  elastic: spinor

twist_sectors: [0.0, 1.0]   # Tw = 0 и Tw = 2π (различаются ℤ₂-классом)

dynamics:
  T0: 0.0
  decay: 1.0
  steps: 25000
  block_convergence:
    block_steps: 25000
    ceiling: 200000
    sigma_mult: 2.0
    e_floor: 0.01

sweep:
  theta_deg_start: 0.0
  theta_deg_stop: 180.0
  theta_deg_step: 7.5

run:
  B: 8192
  seeds: [0, 1]

smoke:
  B: 256
  block_steps: 2000
  ceiling: 8000
  theta_deg: [0.0, 90.0, 180.0]
  seeds: [0]
